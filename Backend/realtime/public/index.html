<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Server</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6fb;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
            padding: 32px 28px 24px 28px;
            max-width: 350px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #2e7d32;
            font-size: 1.7em;
            margin-bottom: 12px;
            font-weight: 600;
        }

        p {
            color: #444;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        a {
            color: #1976d2;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        a:hover {
            color: #0d47a1;
            text-decoration: underline;
        }

        footer {
            margin-top: 18px;
            font-size: 0.95em;
            color: #888;
        }

        @media (max-width: 500px) {
            .container {
                padding: 18px 8px 14px 8px;
            }

            h1 {
                font-size: 1.2em;
            }

            p {
                font-size: 1em;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="https://app.empmonitor.com/amember/data/public/6480b95d97c8e.png" alt="EMPMonitor Logo"
            style="width: 200px; margin-bottom: 18px; border-radius: 8px; box-shadow: 0 2px 8px rgba(30,60,90,0.07);">
        <h1>Realtime Server Status</h1>
        <p>The Realtime server is running successfully.</p>
        <footer>
            <!-- <a href="#">View Documentation</a> -->
        </footer>
    </div>
    <script>
        // Minimal JS for demonstration
        console.log("Realtime server UI loaded.");
    </script>
</body>

</html>
